<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio Central</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #ffffff;
        }
        .card-custom {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card-custom p-5 shadow-lg animate__animated animate__fadeIn">
                    <h1 class="fw-bold mb-3">Mis Proyectos</h1>
                    
                    <a href="https://github.com/Amil-Federico/Proyectos" 
                       class="btn btn-primary btn-lg w-100 mb-3 py-3 fw-semibold shadow" 
                       target="_blank">
                        Gestión de proyectos y tareas 
                    </a>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
